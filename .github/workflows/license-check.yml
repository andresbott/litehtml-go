name: License check
on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  license-check:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install go-licence-detector
        run: |
          go install go.elastic.co/go-licence-detector@v0.10.0

      - name: License check
        run: make license-check
